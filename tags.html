<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags - William's Blog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --sidebar-bg: #1e1e1e;
            --sidebar-hover: #2d2d2d;
            --text-primary: #a0a0a0;
            --text-active: #e0e0e0;
            --main-bg: #121212;
            --border-color: #2a2a2a;
            --accent-color: #00d4aa;
            --card-bg: #1a1a1a;
            --card-hover: #222;
            --tag-hover-bg: #00d4aa;
            --tag-hover-text: #121212;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--main-bg);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Bar Loading Animation */
        .bars-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--main-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .bars-animation.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .bar {
            width: 8px;
            height: 60px;
            background: var(--accent-color);
            margin: 0 4px;
            border-radius: 4px;
            animation: barWave 1.2s ease-in-out infinite;
            animation-delay: calc(var(--i) * 0.1s);
            opacity: 0.8;
        }

        @keyframes barWave {
            0%, 100% { transform: scaleY(0.3); opacity: 0.3; }
            50% { transform: scaleY(1); opacity: 1; }
        }

        /* Layout */
        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0 20px 0;
            border-right: 1px solid var(--border-color);
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .profile-section {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
            padding: 0 20px;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 20px;
            border: 2px solid #3a3a3a;
        }

        .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #d0d0d0;
            letter-spacing: 0.5px;
        }

        .profile-tagline {
            font-size: 0.85rem;
            color: var(--text-primary);
            font-style: italic;
            font-weight: 400;
        }

        /* Navigation */
        .nav-menu {
            width: 100%;
            list-style: none;
            padding: 0 15px;
            flex: 1;
        }

        .nav-item { margin-bottom: 4px; }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        .nav-link:hover, .nav-link.active {
            background-color: var(--sidebar-hover);
            color: var(--text-active);
        }

        .nav-icon {
            width: 18px;
            height: 18px;
            margin-right: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.7;
        }

        .nav-link:hover .nav-icon, .nav-link.active .nav-icon { opacity: 1; }

        .nav-icon svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
        }

        /* Social Links */
        .social-links {
            display: flex;
            gap: 12px;
            padding: 20px;
            justify-content: center;
        }

        .social-link {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 50%;
            background-color: #2a2a2a;
            transition: all 0.2s ease;
        }

        .social-link:hover {
            background-color: #3a3a3a;
            color: var(--text-active);
            transform: translateY(-2px);
        }

        .social-link svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            flex: 1;
            min-height: 100vh;
            padding: 30px;
        }

        /* Breadcrumb */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
            font-size: 0.85rem;
            color: #666;
        }

        .breadcrumb a {
            color: var(--accent-color);
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .breadcrumb a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .breadcrumb-separator {
            color: #444;
        }

        .breadcrumb-current {
            color: var(--text-primary);
        }

        /* Page Title */
        .page-title {
            font-size: 1.8rem;
            color: var(--text-active);
            font-weight: 700;
            margin-bottom: 30px;
        }

        /* Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 30px;
        }

        /* Tags Container */
        .tags-page-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-content: flex-start;
        }

        /* Tag Pill - Main page style */
        .tag-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            font-size: 0.9rem;
            color: var(--accent-color);
            text-decoration: none;
            transition: all 0.25s ease;
        }

        .tag-pill:hover {
            background: var(--tag-hover-bg);
            color: var(--tag-hover-text);
            border-color: var(--tag-hover-bg);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        }

        .tag-pill-count {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* Sidebar Widgets */
        .sidebar-widgets {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .widget {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }

        .widget-title {
            font-size: 1rem;
            color: var(--text-active);
            margin-bottom: 16px;
            font-weight: 600;
        }

        /* Recently Updated - TEXT ONLY (no images) */
        .recent-post-text {
            display: block;
            padding: 10px 0;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid var(--border-color);
            transition: color 0.2s;
        }

        .recent-post-text:last-child {
            border-bottom: none;
        }

        .recent-post-text:hover {
            color: var(--text-active);
        }

        .recent-post-text-title {
            font-size: 0.9rem;
            color: var(--text-primary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .recent-post-text:hover .recent-post-text-title {
            color: var(--accent-color);
        }

        /* Trending Tags - Sidebar style */
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            padding: 6px 14px;
            background: #2a2a2a;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-primary);
            text-decoration: none;
            transition: all 0.25s ease;
            border: 1px solid transparent;
        }

        .tag:hover {
            background: var(--tag-hover-bg);
            color: var(--tag-hover-text);
            border-color: var(--tag-hover-bg);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
            font-weight: 600;
        }

        .tag-count {
            margin-left: 4px;
            opacity: 0.6;
            transition: opacity 0.25s ease;
        }

        .tag:hover .tag-count {
            opacity: 0.8;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-primary);
        }

        .empty-state h3 {
            color: var(--text-active);
            margin-bottom: 10px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--main-bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        /* Mobile Menu Toggle */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            background: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
            .sidebar-widgets {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .widget { flex: 1; min-width: 300px; }
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; }
            .menu-toggle { display: block; }
        }
    </style>
</head>

    <script>
        // ============================================
        // TAGS PAGE - Dynamic Tag Loader
        // ============================================

        const POSTS_DIR = 'posts/';
        const POLL_INTERVAL = 60000;
        let allPosts = [];
        let refreshInterval;

        async function fetchPostsManifest() {
            try {
                const response = await fetch(POSTS_DIR + 'posts.json');
                if (response.ok) return await response.json();
            } catch (e) {
                console.log('No posts.json manifest found...');
            }
            return null;
        }

        async function discoverPosts() {
            const manifest = await fetchPostsManifest();
            if (manifest && Array.isArray(manifest)) {
                return manifest.map(file => POSTS_DIR + file);
            }
            console.warn('No posts.json manifest found. Please create one.');
            return [];
        }

        function parseFrontmatter(markdown) {
            const frontmatterRegex = /^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/;
            const match = markdown.match(frontmatterRegex);
            if (!match) return { meta: {}, content: markdown };

            const yamlText = match[1];
            const content = match[2];
            const meta = {};
            yamlText.split('\n').forEach(line => {
                const colonIndex = line.indexOf(':');
                if (colonIndex > 0) {
                    const key = line.substring(0, colonIndex).trim();
                    let value = line.substring(colonIndex + 1).trim();
                    if ((value.startsWith('"') && value.endsWith('"')) || 
                        (value.startsWith("'") && value.endsWith("'"))) {
                        value = value.slice(1, -1);
                    }
                    if (value.includes(',')) value = value.split(',').map(v => v.trim());
                    meta[key] = value;
                }
            });
            return { meta, content };
        }

        function generateExcerpt(content, maxLength = 120) {
            const clean = content
                .replace(/#{1,6}\s/g, '')
                .replace(/\*\*/g, '').replace(/\*/g, '')
                .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
                .replace(/`{1,3}[^`]*`{1,3}/g, '')
                .replace(/\n/g, ' ').trim();
            if (clean.length <= maxLength) return clean;
            return clean.substring(0, maxLength).trim() + '...';
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'No date';
            const date = new Date(dateStr);
            if (isNaN(date)) return dateStr;
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', month: 'short', day: 'numeric' 
            });
        }

        async function fetchPost(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to fetch');
                const markdown = await response.text();
                const { meta, content } = parseFrontmatter(markdown);
                return {
                    url: url,
                    slug: url.replace(POSTS_DIR, '').replace('.md', ''),
                    title: meta.title || 'Untitled Post',
                    date: meta.date || new Date().toISOString(),
                    description: meta.description || generateExcerpt(content),
                    categories: Array.isArray(meta.categories) ? meta.categories : 
                               (meta.categories ? [meta.categories] : []),
                    tags: Array.isArray(meta.tags) ? meta.tags : 
                          (meta.tags ? [meta.tags] : []),
                    image: meta.image || meta.cover || null,
                    rawDate: new Date(meta.date || Date.now())
                };
            } catch (error) {
                console.error('Error fetching post:', url, error);
                return null;
            }
        }

        function getAllTags(posts) {
            const tagCounts = {};
            posts.forEach(post => {
                // Combine categories and tags for the tags page
                const allTags = [...post.categories, ...post.tags];
                allTags.forEach(tag => {
                    if (tag) tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                });
            });
            return Object.entries(tagCounts).sort((a, b) => a[0].localeCompare(b[0]));
        }

        function renderTagPill(tag, count) {
            return `
                <a href="tags.html?tag=${encodeURIComponent(tag)}" class="tag-pill" onclick="showLoader()">
                    ${tag}
                    <span class="tag-pill-count">${count}</span>
                </a>
            `;
        }

        // TEXT ONLY recent posts (no images)
        function renderRecentPostText(post) {
            return `
                <a href="post.html?slug=${post.slug}" class="recent-post-text" onclick="showLoader()">
                    <div class="recent-post-text-title">${post.title}</div>
                </a>
            `;
        }

        function renderTagsSidebar(tags) {
            return tags.map(([tag, count]) => `
                <a href="tags.html?tag=${encodeURIComponent(tag)}" class="tag" onclick="showLoader()">
                    ${tag}<span class="tag-count">${count}</span>
                </a>
            `).join('');
        }

        function renderPage(posts) {
            const container = document.getElementById('tagsContainer');
            const recent = document.getElementById('recentlyUpdated');
            const trending = document.getElementById('trendingTags');

            if (posts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No tags found</h3>
                        <p>Add markdown files with tags to your <code>posts/</code> folder.</p>
                    </div>
                `;
                recent.innerHTML = '<p style="color:#666;font-size:0.85rem;">No recent posts</p>';
                trending.innerHTML = '';
                return;
            }

            const allTags = getAllTags(posts);
            container.innerHTML = allTags.map(([tag, count]) => renderTagPill(tag, count)).join('');

            const sortedPosts = [...posts].sort((a, b) => b.rawDate - a.rawDate);
            const recentPosts = sortedPosts.slice(0, 5);
            // TEXT ONLY - no images
            recent.innerHTML = recentPosts.map(renderRecentPostText).join('');

            const trendingTags = allTags.sort((a, b) => b[1] - a[1]).slice(0, 10);
            trending.innerHTML = renderTagsSidebar(trendingTags);
        }

        async function loadPosts() {
            showLoader();
            const postUrls = await discoverPosts();
            if (postUrls.length === 0) { renderPage([]); hideLoader(); return; }
            const posts = await Promise.all(postUrls.map(fetchPost));
            allPosts = posts.filter(p => p !== null);
            renderPage(allPosts);
            hideLoader();
        }

        function startAutoRefresh() {
            loadPosts();
            refreshInterval = setInterval(() => { loadPosts(); }, POLL_INTERVAL);
        }

        function stopAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
        }

        function showLoader() {
            document.getElementById('loader').classList.remove('hidden');
        }

        function hideLoader() {
            document.getElementById('loader').classList.add('hidden');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        document.addEventListener('click', function(e) {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.querySelector('.menu-toggle');
            if (window.innerWidth <= 768 && 
                !sidebar.contains(e.target) && 
                !toggle.contains(e.target) && 
                sidebar.classList.contains('active')) {
                sidebar.classList.remove('active');
            }
        });

        window.addEventListener('load', function() {
            setTimeout(() => { startAutoRefresh(); }, 600);
        });

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) stopAutoRefresh();
            else startAutoRefresh();
        });
    </script>
</body>
</html>
