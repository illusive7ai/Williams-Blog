<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>William's Blog - I Hack So You Don't Have To</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --sidebar-bg: #1e1e1e;
            --sidebar-hover: #2d2d2d;
            --text-primary: #a0a0a0;
            --text-active: #e0e0e0;
            --main-bg: #121212;
            --border-color: #2a2a2a;
            --accent-color: #00d4aa;
            --card-bg: #1a1a1a;
            --card-hover: #222;
            --tag-hover-bg: #00d4aa;
            --tag-hover-text: #121212;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--main-bg);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Bar Loading Animation */
        .bars-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--main-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .bars-animation.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .bar {
            width: 8px;
            height: 60px;
            background: var(--accent-color);
            margin: 0 4px;
            border-radius: 4px;
            animation: barWave 1.2s ease-in-out infinite;
            animation-delay: calc(var(--i) * 0.1s);
            opacity: 0.8;
        }

        @keyframes barWave {
            0%, 100% { transform: scaleY(0.3); opacity: 0.3; }
            50% { transform: scaleY(1); opacity: 1; }
        }

        /* Layout */
        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0 20px 0;
            border-right: 1px solid var(--border-color);
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .profile-section {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
            padding: 0 20px;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 20px;
            border: 2px solid #3a3a3a;
        }

        .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #d0d0d0;
            letter-spacing: 0.5px;
        }

        .profile-tagline {
            font-size: 0.85rem;
            color: var(--text-primary);
            font-style: italic;
            font-weight: 400;
        }

        /* Navigation */
        .nav-menu {
            width: 100%;
            list-style: none;
            padding: 0 15px;
            flex: 1;
        }

        .nav-item { margin-bottom: 4px; }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        .nav-link:hover, .nav-link.active {
            background-color: var(--sidebar-hover);
            color: var(--text-active);
        }

        .nav-icon {
            width: 18px;
            height: 18px;
            margin-right: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.7;
        }

        .nav-link:hover .nav-icon, .nav-link.active .nav-icon { opacity: 1; }

        .nav-icon svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
        }

        /* Social Links */
        .social-links {
            display: flex;
            gap: 12px;
            padding: 20px;
            justify-content: center;
        }

        .social-link {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 50%;
            background-color: #2a2a2a;
            transition: all 0.2s ease;
        }

        .social-link:hover {
            background-color: #3a3a3a;
            color: var(--text-active);
            transform: translateY(-2px);
        }

        .social-link svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            flex: 1;
            min-height: 100vh;
            padding: 30px;
        }

        /* Breadcrumb */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
            font-size: 0.85rem;
            color: #666;
        }

        .breadcrumb a {
            color: var(--accent-color);
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .breadcrumb a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .breadcrumb-separator {
            color: #444;
        }

        /* Post Header */
        .post-header {
            margin-bottom: 30px;
        }

        .post-title {
            font-size: 2.2rem;
            color: var(--text-active);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 16px;
        }

        .post-description {
            font-size: 1.1rem;
            color: var(--text-primary);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .post-meta {
            display: flex;
            gap: 20px;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .post-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .meta-icon {
            width: 16px;
            height: 16px;
            color: #666;
            flex-shrink: 0;
        }

        .meta-icon svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
        }

        /* Post Cover Image */
        .post-cover {
            width: 100%;
            max-height: 400px;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
            background: #2a2a2a;
            border: 1px solid var(--border-color);
        }

        .post-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Post Content - Markdown Styles */
        .post-content {
            max-width: 800px;
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.8;
        }

        .post-content h1 {
            color: var(--text-active);
            font-size: 1.8rem;
            margin: 40px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .post-content h2 {
            color: var(--text-active);
            font-size: 1.5rem;
            margin: 35px 0 18px 0;
        }

        .post-content h3 {
            color: var(--text-active);
            font-size: 1.25rem;
            margin: 30px 0 15px 0;
        }

        .post-content h4 {
            color: var(--text-active);
            font-size: 1.1rem;
            margin: 25px 0 12px 0;
        }

        .post-content p {
            margin-bottom: 20px;
        }

        .post-content a {
            color: var(--accent-color);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .post-content a:hover {
            border-bottom-color: var(--accent-color);
        }

        .post-content strong {
            color: var(--text-active);
            font-weight: 600;
        }

        .post-content em {
            font-style: italic;
        }

        .post-content ul, .post-content ol {
            margin: 20px 0;
            padding-left: 30px;
        }

        .post-content li {
            margin-bottom: 10px;
        }

        .post-content ul li {
            list-style-type: disc;
        }

        .post-content ol li {
            list-style-type: decimal;
        }

        .post-content blockquote {
            border-left: 4px solid var(--accent-color);
            padding: 15px 20px;
            margin: 25px 0;
            background: var(--card-bg);
            border-radius: 0 8px 8px 0;
            font-style: italic;
            color: #b0b0b0;
        }

        .post-content blockquote p {
            margin-bottom: 0;
        }

        .post-content code {
            background: #2a2a2a;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.9em;
            color: var(--accent-color);
        }

        .post-content pre {
            background: #1a1a1a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
            margin: 25px 0;
        }

        .post-content pre code {
            background: none;
            padding: 0;
            color: #d4d4d4;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .post-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 20px 0;
            border: 1px solid var(--border-color);
        }

        .post-content hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 40px 0;
        }

        .post-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 25px 0;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .post-content th {
            background: var(--card-bg);
            color: var(--text-active);
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
        }

        .post-content td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .post-content tr:last-child td {
            border-bottom: none;
        }

        .post-content tr:hover {
            background: rgba(255,255,255,0.02);
        }

        /* Tags Section */
        .post-tags {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
        }

        .post-tags-title {
            font-size: 0.9rem;
            color: var(--text-active);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            padding: 6px 14px;
            background: #2a2a2a;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-primary);
            text-decoration: none;
            transition: all 0.25s ease;
            border: 1px solid transparent;
        }

        .tag:hover {
            background: var(--tag-hover-bg);
            color: var(--tag-hover-text);
            border-color: var(--tag-hover-bg);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
            font-weight: 600;
        }

        /* Navigation between posts */
        .post-navigation {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
        }

        .nav-post {
            padding: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
        }

        .nav-post:hover {
            border-color: #3a3a3a;
            transform: translateY(-2px);
        }

        .nav-post-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .nav-post-title {
            font-size: 0.95rem;
            color: var(--text-active);
            font-weight: 600;
            line-height: 1.3;
        }

        .nav-post.next {
            text-align: right;
        }

        /* Error State */
        .error-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-primary);
        }

        .error-state h2 {
            color: var(--text-active);
            margin-bottom: 10px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--main-bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        /* Mobile Menu Toggle */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            background: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; }
            .menu-toggle { display: block; }
            .post-title { font-size: 1.6rem; }
            .post-content { font-size: 0.95rem; }
            .post-navigation { grid-template-columns: 1fr; }
            .nav-post.next { text-align: left; }
        }
    </style>
</head>

        const calendarIcon = `<svg class="meta-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11zM9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm-8 4H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/></svg>`;
        
        const folderIcon = `<svg class="meta-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>`;

        const tagIcon = `<svg class="meta-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 .9-2 2v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58.55 0 1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41 0-.55-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z"/></svg>`;

        function getSlugFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('slug');
        }

        function parseFrontmatter(markdown) {
            const frontmatterRegex = /^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/;
            const match = markdown.match(frontmatterRegex);
            
            if (!match) {
                return { meta: {}, content: markdown };
            }

            const yamlText = match[1];
            const content = match[2];
            const meta = {};

            yamlText.split('\n').forEach(line => {
                const colonIndex = line.indexOf(':');
                if (colonIndex > 0) {
                    const key = line.substring(0, colonIndex).trim();
                    let value = line.substring(colonIndex + 1).trim();
                    if ((value.startsWith('"') && value.endsWith('"')) || 
                        (value.startsWith("'") && value.endsWith("'"))) {
                        value = value.slice(1, -1);
                    }
                    if (value.includes(',')) {
                        value = value.split(',').map(v => v.trim());
                    }
                    meta[key] = value;
                }
            });

            return { meta, content };
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'No date';
            const date = new Date(dateStr);
            if (isNaN(date)) return dateStr;
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric' 
            });
        }

        // Markdown to HTML converter
        function markdownToHtml(markdown) {
            let html = markdown;

            // Escape HTML in text, but preserve markdown syntax
            // First, protect code blocks
            const codeBlocks = [];
            html = html.replace(/```([\s\S]*?)```/g, (match, code) => {
                codeBlocks.push(code);
                return `<!--CODEBLOCK${codeBlocks.length - 1}-->`;
            });

            // Protect inline code
            const inlineCodes = [];
            html = html.replace(/`([^`]+)`/g, (match, code) => {
                inlineCodes.push(code);
                return `<!--INLINECODE${inlineCodes.length - 1}-->`;
            });

            // Headers
            html = html.replace(/^#### (.*$)/gim, '<h4>$1</h4>');
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');

            // Bold
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__(.*?)__/g, '<strong>$1</strong>');

            // Italic (but not inside bold)
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            html = html.replace(/_(.*?)_/g, '<em>$1</em>');

            // Links
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

            // Images
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" />');

            // Horizontal rules
            html = html.replace(/^---$/gim, '<hr>');

            // Blockquotes
            html = html.replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>');
            // Merge consecutive blockquotes
            html = html.replace(/<<\/blockquote>\n<<blockquote>/g, '\n');

            // Lists - unordered
            html = html.replace(/^[\*\-] (.*$)/gim, '<li>$1</li>');
            // Wrap consecutive li in ul
            html = html.replace(/(<li>.*<<\/li>\n?)+/g, '<ul>$&</ul>');
            // Remove extra ul nesting
            html = html.replace(/<<ul><ul>/g, '<ul>');
            html = html.replace(/<<\/ul><\/ul>/g, '</ul>');

            // Lists - ordered
            html = html.replace(/^\d+\. (.*$)/gim, '<li>$1</li>');
            // Wrap consecutive li in ol (but not already in ul)
            // Simple approach: replace remaining li groups
            const liRegex = /(<li>.*<<\/li>\n?)+/g;
            html = html.replace(liRegex, (match) => {
                if (match.includes('<ul>')) return match;
                return `<ol>${match}</ol>`;
            });

            // Tables (simple support)
            const lines = html.split('\n');
            let inTable = false;
            let tableHtml = [];
            let result = [];
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (line.includes('|')) {
                    const cells = line.split('|').map(c => c.trim()).filter(c => c);
                    if (cells.length > 0) {
                        if (!inTable) {
                            inTable = true;
                            tableHtml = ['<<table>'];
                        }
                        // Check if separator line
                        if (cells.every(c => c.replace(/-/g, '').trim() === '')) {
                            continue; // Skip separator
                        }
                        const isHeader = i > 0 && lines[i-1].includes('|') && lines[i+1] && lines[i+1].includes('|') && lines[i+1].replace(/[|\-\s]/g, '') === '';
                        const tag = isHeader ? 'th' : 'td';
                        tableHtml.push('<tr>' + cells.map(c => `<${tag}>${c}</${tag}>`).join('') + '</tr>');
                        continue;
                    }
                }
                if (inTable) {
                    tableHtml.push('</table>');
                    result.push(tableHtml.join(''));
                    tableHtml = [];
                    inTable = false;
                }
                result.push(line);
            }
            if (inTable) {
                tableHtml.push('</table>');
                result.push(tableHtml.join(''));
            }
            html = result.join('\n');

            // Paragraphs - wrap non-tag lines
            const paragraphs = html.split('\n\n');
            html = paragraphs.map(p => {
                p = p.trim();
                if (!p) return '';
                if (p.startsWith('<') && !p.startsWith('<li>')) return p;
                if (p.includes('<ul>') || p.includes('<ol>') || p.includes('<table>')) return p;
                return `<p>${p}</p>`;
            }).join('\n');

            // Restore code blocks
            codeBlocks.forEach((code, i) => {
                html = html.replace(`<!--CODEBLOCK${i}-->`, `<pre><code>${escapeHtml(code)}</code></pre>`);
            });

            // Restore inline code
            inlineCodes.forEach((code, i) => {
                html = html.replace(`<!--INLINECODE${i}-->`, `<code>${escapeHtml(code)}</code>`);
            });

            // Clean up multiple newlines
            html = html.replace(/\n+/g, '\n');
            
            return html;
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        async function fetchPost(slug) {
            const url = POSTS_DIR + slug + '.md';
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to fetch');
                const markdown = await response.text();
                const { meta, content } = parseFrontmatter(markdown);
                
                return {
                    slug: slug,
                    title: meta.title || 'Untitled Post',
                    date: meta.date || new Date().toISOString(),
                    description: meta.description || '',
                    categories: Array.isArray(meta.categories) ? meta.categories : 
                               (meta.categories ? [meta.categories] : []),
                    tags: Array.isArray(meta.tags) ? meta.tags : 
                          (meta.tags ? [meta.tags] : []),
                    image: meta.image || meta.cover || null,
                    content: content
                };
            } catch (error) {
                console.error('Error fetching post:', error);
                return null;
            }
        }

        async function fetchAllPosts() {
            try {
                const response = await fetch(POSTS_DIR + 'posts.json');
                if (response.ok) {
                    const manifest = await response.json();
                    const posts = await Promise.all(
                        manifest.map(file => {
                            const slug = file.replace('.md', '');
                            return fetchPost(slug);
                        })
                    );
                    return posts.filter(p => p !== null).sort((a, b) => 
                        new Date(b.date) - new Date(a.date)
                    );
                }
            } catch (e) {
                console.warn('No posts.json manifest found');
            }
            return [];
        }

        function renderPost(post, allPosts) {
            const container = document.getElementById('postContainer');
            const breadcrumbTitle = document.getElementById('breadcrumbTitle');
            
            // Update breadcrumb
            breadcrumbTitle.textContent = post.title;
            document.title = `${post.title} - William's Blog`;

            const categories = post.categories.length > 0 ? post.categories.join(', ') : 'Uncategorized';
            const tags = post.tags.length > 0 ? post.tags : [];
            
            // Cover image
            const coverHtml = post.image 
                ? `<div class="post-cover"><img src="${post.image}" alt="${post.title}" onerror="this.style.display='none'"></div>` 
                : '';

            // Tags HTML
            const tagsHtml = tags.length > 0 
                ? `<div class="post-tags">
                     <div class="post-tags-title">Tags</div>
                     <div class="tags-container">
                        ${tags.map(tag => `<a href="tags.html?tag=${encodeURIComponent(tag)}" class="tag">${tag}</a>`).join('')}
                     </div>
                   </div>`
                : '';

            // Find prev/next posts
            const currentIndex = allPosts.findIndex(p => p.slug === post.slug);
            const prevPost = currentIndex > 0 ? allPosts[currentIndex - 1] : null;
            const nextPost = currentIndex < allPosts.length - 1 ? allPosts[currentIndex + 1] : null;

            const navHtml = `
                <div class="post-navigation">
                    ${prevPost ? `
                        <a href="post.html?slug=${prevPost.slug}" class="nav-post" onclick="showLoader()">
                            <div class="nav-post-label">← Previous</div>
                            <div class="nav-post-title">${prevPost.title}</div>
                        </a>
                    ` : '<div></div>'}
                    ${nextPost ? `
                        <a href="post.html?slug=${nextPost.slug}" class="nav-post next" onclick="showLoader()">
                            <div class="nav-post-label">Next →</div>
                            <div class="nav-post-title">${nextPost.title}</div>
                        </a>
                    ` : '<div></div>'}
                </div>
            `;

            container.innerHTML = `
                <div class="post-header">
                    <h1 class="post-title">${post.title}</h1>
                    ${post.description ? `<p class="post-description">${post.description}</p>` : ''}
                    <div class="post-meta">
                        <span>${calendarIcon} ${formatDate(post.date)}</span>
                        <span>${folderIcon} ${categories}</span>
                        ${tags.length > 0 ? `<span>${tagIcon} ${tags.join(', ')}</span>` : ''}
                    </div>
                </div>
                
                ${coverHtml}
                
                <div class="post-content">
                    ${markdownToHtml(post.content)}
                </div>
                
                ${tagsHtml}
                ${navHtml}
            `;
        }

        function renderError(message) {
            const container = document.getElementById('postContainer');
            const breadcrumbTitle = document.getElementById('breadcrumbTitle');
            breadcrumbTitle.textContent = 'Error';
            
            container.innerHTML = `
                <div class="error-state">
                    <h2>Post Not Found</h2>
                    <p>${message}</p>
                    <p style="margin-top: 20px;">
                        <a href="index.html" style="color: var(--accent-color);">← Back to Home</a>
                    </p>
                </div>
            `;
        }

        async function loadPost() {
            showLoader();
            
            const slug = getSlugFromUrl();
            if (!slug) {
                renderError('No post slug provided in URL. Use ?slug=your-post-name');
                hideLoader();
                return;
            }

            // Fetch all posts for navigation
            const allPosts = await fetchAllPosts();
            
            // Fetch current post
            const post = await fetchPost(slug);
            
            if (!post) {
                renderError(`Could not load post: "${slug}". Make sure the file exists in the posts/ folder.`);
                hideLoader();
                return;
            }

            renderPost(post, allPosts);
            hideLoader();
        }

        function showLoader() {
            document.getElementById('loader').classList.remove('hidden');
        }

        function hideLoader() {
            document.getElementById('loader').classList.add('hidden');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        document.addEventListener('click', function(e) {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.querySelector('.menu-toggle');
            
            if (window.innerWidth <= 768 && 
                !sidebar.contains(e.target) && 
                !toggle.contains(e.target) && 
                sidebar.classList.contains('active')) {
                sidebar.classList.remove('active');
            }
        });

        window.addEventListener('load', function() {
            setTimeout(() => {
                loadPost();
            }, 600);
        });
    </script>
</body>
